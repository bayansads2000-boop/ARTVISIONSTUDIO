backend:
  name: github
  repo: bayansads2000-boop/ARTVISIONSTUDIO
  branch: main

publish_mode: editorial_workflow

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "⚙️ الإعدادات العامة"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "الاعدادات"
        file: "src/lib/data/settings.json"
        format: "json"
        fields:
          - label: "البيانات الأساسية"
            name: "basic_info"
            widget: "object"
            fields:
              - {label: "عنوان المتصفح", name: "site_title", widget: "string", default: "Art Vision Studio"}
              - {label: "وصف الـ SEO", name: "site_description", widget: "text"}
              - {label: "اللوجو (صورة)", name: "logo", widget: "image"}
              - {label: "اللوجو (SVG نصي)", name: "logo_svg", widget: "code", default_language: "html", required: false}

          - label: "قسم الهيرو (الواجهة الرئيسية)"
            name: "hero"
            widget: "object"
            fields:
              - {label: "العنوان الرئيسي", name: "title", widget: "string"}
              - {label: "العنوان الملون", name: "title_accent", widget: "string"}
              - {label: "الوصف الفرعي", name: "subtitle", widget: "text"}
              - {label: "نص الزر (CTA)", name: "cta_text", widget: "string"}
              - {label: "صورة الخلفية", name: "bg_image", widget: "image", required: false}

          - label: "روابط التواصل"
            name: "contact"
            widget: "object"
            fields:
              - {label: "رقم الواتساب (بدون +)", name: "whatsapp", widget: "string"}
              - {label: "الايميل", name: "email", widget: "string"}
              - {label: "الهاتف", name: "phone", widget: "string"}
              - {label: "العنوان", name: "address", widget: "string"}
              - {label: "فيسبوك", name: "facebook", widget: "string", required: false}
              - {label: "انستجرام", name: "instagram", widget: "string", required: false}
            
          - label: "تصميم الموقع (Colors)"
            name: "theme"
            widget: "object"
            fields:
              - {label: "اللون الأساسي", name: "primary_color", widget: "color", default: "#e31e24"}
              - {label: "لون الخلفية", name: "bg_color", widget: "color", default: "#0a0a0a"}

  - name: "portfolio"
    label: "🎥 معرض الأعمال"
    folder: "src/lib/data/portfolio"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    fields:
      - {label: "اسم العمل", name: "title", widget: "string"}
      - {label: "التصنيف", name: "category", widget: "select", options: [{label: "مواقع ويب", value: "websites"}, {label: "تصميمات", value: "designs"}, {label: "فيديوهات", value: "videos"}]}
      - {label: "الصورة", name: "image", widget: "image"}
      - {label: "فيديو (YouTube/Vimeo Link)", name: "video_link", widget: "string", required: false}
      - {label: "الوصف", name: "description", widget: "text"}
      - {label: "تاريخ العمل", name: "date", widget: "datetime", format: "YYYY-MM-DD"}

  - name: "services"
    label: "✨ الخدمات"
    folder: "src/lib/data/services"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    fields:
      - {label: "اسم الخدمة", name: "title", widget: "string"}
      - {label: "الأيقونة (Emoji or SVG)", name: "icon", widget: "string"}
      - {label: "شرح الخدمة", name: "description", widget: "text"}
      - {label: "مميزات إضافية", name: "features", widget: "list", required: false}

  - name: "packages"
    label: "💎 الباقات والأسعار"
    folder: "src/lib/data/packages"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    fields:
      - {label: "اسم الباقة", name: "title", widget: "string"}
      - {label: "السعر", name: "price", widget: "string"}
      - {label: "العملة", name: "currency", widget: "string", default: "$"}
      - {label: "المميزات", name: "features", widget: "list"}
      - {label: "باقة مميزة؟", name: "popular", widget: "boolean", default: false}
      - {label: "نص الزر", name: "button_text", widget: "string", default: "اطلب الآن"}
