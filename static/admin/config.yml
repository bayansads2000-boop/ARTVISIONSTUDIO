backend:
  name: github
  repo: bayansads2000-boop/ARTVISIONSTUDIO
  branch: main

publish_mode: editorial_workflow

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "⚙️ الإعدادات العامة"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "الاعدادات"
        file: "src/lib/data/settings.json"
        format: "json"
        fields:
          - label: "البيانات الأساسية"
            name: "basic_info"
            widget: "object"
            fields:
              - {label: "عنوان المتصفح", name: "site_title", widget: "string", default: "Art Vision Studio"}
              - {label: "وصف الـ SEO", name: "site_description", widget: "text"}
              - {label: "اللوجو (صورة)", name: "logo", widget: "image"}
              - {label: "رابط الموقع (URL)", name: "site_url", widget: "string", default: "https://artvisionstudio.pages.dev"}

          - label: "إعدادات SEO & Social Meta"
            name: "meta"
            widget: "object"
            fields:
              - {label: "صورة المشاركة (OG Image)", name: "og_image", widget: "image"}
              - {label: "اسم المنظمة (Organization Name)", name: "org_name", widget: "string", default: "Art Vision Studio"}

          - label: "الرسائل التلقائية (WhatsApp)"
            name: "whatsapp_messages"
            widget: "object"
            fields:
              - {label: "رسالة الهيرو", name: "hero_msg", widget: "string", default: "مرحباً ART VISION، أريد الاستفسار عن خدماتكم."}
              - {label: "رسالة الباقات", name: "package_msg", widget: "string", default: "مرحباً، أريد الاشتراك في باقة: "}
              - {label: "رسالة معرض الأعمال", name: "portfolio_msg", widget: "string", default: "مرحباً، أعجبني هذا العمل وأريد تنفيذ شيء مشابه: "}

          - label: "قسم الهيرو (الواجهة الرئيسية)"
            name: "hero"
            widget: "object"
            fields:
              - {label: "العنوان الرئيسي", name: "title", widget: "string"}
              - {label: "العنوان الملون", name: "title_accent", widget: "string"}
              - {label: "الوصف الفرعي", name: "subtitle", widget: "text"}
              - {label: "نص الزر (CTA)", name: "cta_text", widget: "string"}
              - {label: "صورة الخلفية", name: "bg_image", widget: "image"}

          - label: "روابط التواصل"
            name: "contact"
            widget: "object"
            fields:
              - {label: "رقم الواتساب (بدون +)", name: "whatsapp", widget: "string"}
              - {label: "الايميل", name: "email", widget: "string"}
              - {label: "الهاتف", name: "phone", widget: "string"}
              - {label: "العنوان", name: "address", widget: "string"}
            
          - label: "تصميم الموقع (Colors)"
            name: "theme"
            widget: "object"
            fields:
              - {label: "اللون الأساسي", name: "primary_color", widget: "color", default: "#e31e24"}
              - {label: "لون الخلفية", name: "bg_color", widget: "color", default: "#0a0a0a"}

  - name: "portfolio"
    label: "🎥 معرض الأعمال"
    folder: "src/lib/data/portfolio"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    fields:
      - {label: "اسم العمل", name: "title_ar", widget: "string"}
      - {label: "اسم العمل (EN)", name: "title_en", widget: "string"}
      - {label: "التصنيف", name: "category", widget: "select", options: [{label: "مواقع ويب", value: "websites"}, {label: "تصميمات", value: "designs"}, {label: "فيديوهات", value: "videos"}]}
      - {label: "الصورة الرئيسية", name: "image", widget: "image"}
      - {label: "الوصف (AR)", name: "description_ar", widget: "string"}
      - {label: "الوصف (EN)", name: "description_en", widget: "string"}
      - {label: "محتوى العمل (AR)", name: "body_ar", widget: "markdown"}
      - {label: "محتوى العمل (EN)", name: "body_en", widget: "markdown"}

  - name: "services"
    label: "✨ الخدمات"
    folder: "src/lib/data/services"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    fields:
      - {label: "اسم الخدمة (AR)", name: "title_ar", widget: "string"}
      - {label: "اسم الخدمة (EN)", name: "title_en", widget: "string"}
      - {label: "الأيقونة", name: "icon", widget: "string"}
      - {label: "شرح الخدمة (AR)", name: "description_ar", widget: "text"}
      - {label: "شرح الخدمة (EN)", name: "description_en", widget: "text"}

  - name: "packages"
    label: "💎 الباقات والأسعار"
    folder: "src/lib/data/packages"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    fields:
      - {label: "اسم الباقة (AR)", name: "title_ar", widget: "string"}
      - {label: "اسم الباقة (EN)", name: "title_en", widget: "string"}
      - {label: "السعر", name: "price", widget: "string"}
      - {label: "المميزات (AR)", name: "features_ar", widget: "list"}
      - {label: "المميزات (EN)", name: "features_en", widget: "list"}
